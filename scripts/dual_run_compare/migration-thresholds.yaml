version: 0B-2026-05-05
schema_version: 1
source_document: ../../../docs/migration-vibecomfy.md#11-migration-thresholds-single-source-of-truth
generated_for: sprint_0b_thresholds_and_golden_corpus

calibration_status_enum:
  - green
  - pending_calibration
  - deferred_pending_sprint_0c_disk
  - wgp_only
  - owner_deferred

metric_keys:
  - image_phash_normalized_hamming
  - image_ssim
  - image_pixel_dimensions
  - image_format_container
  - video_frame_count
  - video_phash_mean
  - video_phash_p95
  - video_duration_ms
  - video_fps
  - video_audio_duration_ms
  - latency_p95_wall_clock_ratio
  - vram_peak_ratio
  - error_oom_count
  - canary_output_divergence_rate

defaults:
  image_phash_normalized_hamming:
    class: image_dual_run
    metric: Perceptual hash difference (normalized Hamming)
    comparator: max
    threshold: 0.05
    unit: normalized_hamming
    failure_action: Mark task RED in Sprint 3 report; block cohort canary
  image_ssim:
    class: image_dual_run
    metric: SSIM
    comparator: min
    threshold: 0.92
    unit: ratio
    failure_action: Mark task RED
  image_pixel_dimensions:
    class: image_dual_run
    metric: Pixel dimensions
    comparator: exact
    threshold: exact_match
    unit: pixels
    failure_action: Mark task RED
  image_format_container:
    class: image_dual_run
    metric: Format / container
    comparator: exact
    threshold: exact_match
    unit: container
    failure_action: Mark task RED
  video_frame_count:
    class: video_dual_run
    metric: Frame count
    comparator: exact
    threshold: exact_match
    unit: frames
    failure_action: Mark task RED
  video_phash_mean:
    class: video_dual_run
    metric: Per-frame pHash mean
    comparator: max
    threshold: 0.08
    unit: normalized_hamming
    failure_action: Mark task RED
  video_phash_p95:
    class: video_dual_run
    metric: Per-frame pHash p95
    comparator: max
    threshold: 0.12
    unit: normalized_hamming
    failure_action: Mark task RED
  video_duration_ms:
    class: video_dual_run
    metric: Duration
    comparator: tolerance
    threshold:
      absolute_ms: 50
    unit: milliseconds
    failure_action: Mark task RED
  video_fps:
    class: video_dual_run
    metric: FPS
    comparator: exact
    threshold: exact_match
    unit: fps
    failure_action: Mark task RED
  video_audio_duration_ms:
    class: video_dual_run
    metric: Audio duration (when present)
    comparator: tolerance
    threshold:
      absolute_ms: 50
    unit: milliseconds
    applies_when: audio_present
    failure_action: Mark task RED
  latency_p95_wall_clock_ratio:
    class: latency
    metric: Comfy p95 wall-clock per task type
    comparator: max
    threshold: 1.10
    unit: wgp_p95_ratio
    failure_action: Mark task RED; cohort canary auto-rollback if sustained 24h
  vram_peak_ratio:
    class: vram
    metric: Comfy peak VRAM per task type per profile
    comparator: max
    threshold: 1.05
    unit: wgp_peak_ratio
    failure_action: Mark task RED
  error_oom_count:
    class: error_class
    metric: OOM count over dual-run corpus
    comparator: exact
    threshold: 0
    unit: count
    failure_action: Block cohort canary
  canary_output_divergence_rate:
    class: canary_divergence
    metric: Output-divergence rate per cohort (per-frame pHash p95 breach rate)
    comparator: max
    threshold: 0.01
    unit: ratio_24h
    measurement_guard: isolated shadow/sampled tasks over 24h with no completion, billing, upload, or user-visible side effects
    failure_action: Auto-rollback only if measured through isolated shadow runs; otherwise mark cohort review-required and stop promotion

