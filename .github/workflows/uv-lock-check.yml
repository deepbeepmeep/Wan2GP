name: uv lock check

on:
  push:
  pull_request:

jobs:
  lock-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check
